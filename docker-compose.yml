version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hospital-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - hospital-net

  frontend:
    build: ./frontend
    container_name: hospital-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hospital-net

networks:
  hospital-net:
    driver: bridge
