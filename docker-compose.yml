version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hospital-backend
    ports:
      - "5000:5000"
    environment:
      # Replace with your MongoDB Atlas connection string
      - MONGODB_URI=mongodb+srv://<username>:<password>@<cluster>.mongodb.net/smart-hospital-erp?retryWrites=true&w=majority
      - JWT_SECRET=hospital_erp_jwt_secret_key_2024
      - JWT_REFRESH_SECRET=hospital_erp_refresh_secret_key_2024
      - JWT_EXPIRE=24h
      - JWT_REFRESH_EXPIRE=7d
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
    networks:
      - hospital-net

  frontend:
    build: ./frontend
    container_name: hospital-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hospital-net

networks:
  hospital-net:
    driver: bridge
